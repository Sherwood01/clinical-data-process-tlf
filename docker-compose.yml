# =============================================================================
# TLF Report Generator SaaS Platform — Docker Compose (镜像拉取部署)
# =============================================================================
# 部署方式：服务器只需拉取镜像启动，不需要安装 Git/Node/Python
#
# 首次部署：
#   docker compose up -d
#   docker compose exec api alembic upgrade head
#
# 更新部署：
#   docker compose pull
#   docker compose up -d
# =============================================================================

services:
  # ── Database ──
  postgres:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: tlf_saas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tlf_saas"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - tlf-network
    deploy:
      resources:
        limits: { memory: 2G }

  # ── Cache & Task Queue ──
  redis:
    image: redis:alpine
    volumes:
      - redisdata:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - tlf-network
    deploy:
      resources:
        limits: { memory: 512M }

  # ── File Storage (S3-compatible) ──
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9100"
    volumes:
      - miniodata:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    expose:
      - "9000"   # S3 API
      - "9100"   # Console
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - tlf-network
    deploy:
      resources:
        limits: { memory: 512M }

  # ── Authentication Server (Stack Auth) ──
  stack-auth:
    # 从 GitHub Container Registry 拉取（Docker Hub 在国内无法访问）
    image: stackauth/server:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NEXTAUTH_URL: ${STACK_AUTH_URL:-http://localhost:8101}
      NEXT_PUBLIC_APP_URL: ${STACK_AUTH_URL:-http://localhost:8101}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?必须设置 NEXTAUTH_SECRET}
      STACK_DATABASE_CONNECTION_STRING: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/tlf_saas
      NEXT_PUBLIC_STACK_API_URL: http://stack-auth:8101/api/v1
      STACK_SELF_HOSTED: "true"
    expose:
      - "8101"
    restart: unless-stopped
    networks:
      - tlf-network
    deploy:
      resources:
        limits: { memory: 512M }

  # ── API Server (FastAPI) ──
  api:
    image: ghcr.io/Sherwood01/tlf-api:latest
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${DB_PASSWORD:-postgres}@postgres:5432/tlf_saas
      DATABASE_SYNC_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/tlf_saas
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      STACK_AUTH_JWKS_URL: http://stack-auth:8101/api/v1/.well-known/jwks.json
      STACK_AUTH_ISSUER: http://stack-auth:8101
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3100}
      DEBUG: "false"
    ports:
      - "${API_PORT:-8100}:8100"
    restart: unless-stopped
    networks:
      - tlf-network
    deploy:
      resources:
        limits: { memory: 1G }

  # ── Celery Worker ──
  worker:
    image: ghcr.io/Sherwood01/tlf-worker:latest
    depends_on:
      api:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${DB_PASSWORD:-postgres}@postgres:5432/tlf_saas
      DATABASE_SYNC_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/tlf_saas
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      WORKER_TEMP_DIR: /tmp/tlf-worker
    volumes:
      - workertmp:/tmp/tlf-worker
    restart: unless-stopped
    networks:
      - tlf-network
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "2"
          memory: 4G

  # ── Frontend (Next.js) ──
  frontend:
    image: ghcr.io/Sherwood01/tlf-frontend:latest
    depends_on:
      - api
      - stack-auth
    environment:
      NEXT_PUBLIC_STACK_PROJECT_ID: ${STACK_PROJECT_ID:-internal}
      NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY: ${STACK_PUBLISHABLE_KEY:-}
      NEXT_PUBLIC_STACK_URL: ${STACK_AUTH_URL:-http://localhost:8101}
    ports:
      - "${FRONTEND_PORT:-3100}:3000"
    restart: unless-stopped
    networks:
      - tlf-network
    deploy:
      resources:
        limits: { memory: 256M }


networks:
  tlf-network:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  miniodata:
  workertmp:
