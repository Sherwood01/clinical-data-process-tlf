# =============================================================================
# TLF Report Generator SaaS Platform — Docker Compose (镜像拉取部署)
# =============================================================================
# 部署方式：服务器只需拉取镜像启动，不需要安装 Git/Node/Python
#
# 首次部署：
#   docker compose up -d
#   docker compose exec api alembic upgrade head
#
# 更新部署：
#   docker compose pull
#   docker compose up -d
# =============================================================================

services:
  # ── Database ──
  postgres:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: tlf_saas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tlf_saas"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - tlf-network
    deploy:
      resources:
        limits: { memory: 2G }

  # ── Cache & Task Queue ──
  redis:
    image: redis:alpine
    volumes:
      - redisdata:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - tlf-network
    deploy:
      resources:
        limits: { memory: 1G }

  # ── File Storage (S3-compatible) ──
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9100"
    volumes:
      - miniodata:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    expose:
      - "9000"   # S3 API
      - "9100"   # Console
    ports:
      - "${MINIO_PORT:-9000}:9000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - tlf-network
    deploy:
      resources:
        limits: { memory: 1G }

  # ── Authentication Server (Stack Auth) ──
  stack-auth:
    # 从 GitHub Container Registry 拉取（Docker Hub 在国内无法访问）
    image: stackauth/server:latest
    entrypoint: ["/bin/bash", "/stack-auth-entrypoint.sh"]
    volumes:
      - ./stack-auth-entrypoint.sh:/stack-auth-entrypoint.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NEXTAUTH_URL: ${STACK_AUTH_URL:-http://localhost:8101}
      NEXT_PUBLIC_APP_URL: ${STACK_AUTH_URL:-http://localhost:8101}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?必须设置 NEXTAUTH_SECRET}
      STACK_DATABASE_CONNECTION_STRING: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/tlf_saas
      # 浏览器端 Dashboard 请求的 API 地址（必须是浏览器能访问的 localhost）
      NEXT_PUBLIC_STACK_API_URL: http://localhost:8102
      # Stack Auth 的客户端 SDK 基础 URL（Dashboard 前端 JS 通过 sentinel 注入）
      NEXT_PUBLIC_STACK_URL: http://localhost:8102
      # Dashboard 自身的 URL
      NEXT_PUBLIC_STACK_DASHBOARD_URL: http://localhost:8101
      STACK_SELF_HOSTED: "true"
      STACK_INTERNAL_PROJECT_PUBLISHABLE_CLIENT_KEY: ${STACK_PUBLISHABLE_KEY}
      STACK_SEED_INTERNAL_PROJECT_SIGN_UP_ENABLED: "true"
      STACK_CLICKHOUSE_URL: ${STACK_CLICKHOUSE_URL:-}
      STACK_CLICKHOUSE_ADMIN_PASSWORD: ${STACK_CLICKHOUSE_ADMIN_PASSWORD:-}
      STACK_CLICKHOUSE_EXTERNAL_PASSWORD: ${STACK_CLICKHOUSE_EXTERNAL_PASSWORD:-}


    ports:
      - "8101:8101"
      - "8102:8102"
    restart: unless-stopped
    networks:
      - tlf-network
    deploy:
      resources:
        limits: { memory: 1G }

  # ── API Server (FastAPI) ──
  api:
    image: ghcr.io/sherwood01/tlf-api:latest
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${DB_PASSWORD:-postgres}@postgres:5432/tlf_saas
      DATABASE_SYNC_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/tlf_saas
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_PUBLIC_ENDPOINT: http://localhost:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      STACK_AUTH_JWKS_URL: http://stack-auth:8102/api/latest/projects/internal/.well-known/jwks.json
      STACK_AUTH_ISSUER: http://localhost:8102/api/v1/projects/internal
      STACK_AUTH_AUDIENCE: internal
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3100}
      API_PORT: "8000"
      DEBUG: "false"
      PYTHONPATH: /app
    volumes:
      - ./backend:/app/backend
      - ./src:/app/src
    ports:
      - "${API_PORT:-8100}:8000"
    restart: unless-stopped
    networks:
      - tlf-network
    deploy:
      resources:
        limits: { memory: 1G }

  # ── Celery Worker ──
  worker:
    image: ghcr.io/sherwood01/tlf-worker:latest
    build:
      context: .
      dockerfile: backend/Dockerfile.worker
    depends_on:
      api:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${DB_PASSWORD:-postgres}@postgres:5432/tlf_saas
      DATABASE_SYNC_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/tlf_saas
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      WORKER_TEMP_DIR: /tmp/tlf-worker
      PYTHONPATH: /app
    volumes:
      - ./backend:/app/backend
      - ./src:/app/src
      - workertmp:/tmp/tlf-worker
    restart: unless-stopped
    networks:
      - tlf-network
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "2"
          memory: 4G

  # ── Frontend (Next.js) ──
  frontend:
    image: ghcr.io/sherwood01/tlf-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder
      args:
        NEXT_PUBLIC_STACK_PROJECT_ID: ${STACK_PROJECT_ID:-internal}
        NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY: ${STACK_PUBLISHABLE_KEY:-}
        NEXT_PUBLIC_STACK_URL: http://localhost:3100
        NEXT_PUBLIC_BROWSER_STACK_API_URL: http://localhost:3100
        NEXT_PUBLIC_STACK_EXTRA_REQUEST_HEADERS: '{"x-stack-access-type":"client"}'
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api
      - stack-auth
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: /api/v1
      API_REWRITE_URL: http://api:8000/api/v1
      NEXT_PUBLIC_STACK_PROJECT_ID: ${STACK_PROJECT_ID:-internal}
      NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY: ${STACK_PUBLISHABLE_KEY:-}
      NEXT_PUBLIC_STACK_URL: http://localhost:3100
      NEXT_PUBLIC_BROWSER_STACK_API_URL: http://localhost:3100
      NEXT_PUBLIC_STACK_API_URL_SERVER: http://localhost:3000
      NEXT_PUBLIC_STACK_EXTRA_REQUEST_HEADERS: '{"x-stack-access-type":"client"}'
    ports:
      - "${FRONTEND_PORT:-3100}:3000"
    restart: unless-stopped
    networks:
      - tlf-network
    deploy:
      resources:
        limits: { memory: 1G }


networks:
  tlf-network:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  miniodata:
  workertmp:
