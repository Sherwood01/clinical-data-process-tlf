version: "3.9"

services:
  # ── Database ──
  postgres:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: tlf_saas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tlf_saas"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G

  # ── Cache & Task Queue ──
  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ── File Storage (S3-compatible) ──
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9100"
    volumes:
      - miniodata:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9100:9100"   # Console
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Authentication Server (Stack Auth) ──
  stack-auth:
    image: stackauth/server:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NEXTAUTH_URL: ${STACK_AUTH_URL:-http://localhost:8101}
      NEXT_PUBLIC_APP_URL: ${STACK_AUTH_URL:-http://localhost:8101}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-to-a-random-secret}
      STACK_DATABASE_CONNECTION_STRING: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/tlf_saas
      NEXT_PUBLIC_STACK_API_URL: http://stack-auth:8101/api/v1
      STACK_SELF_HOSTED: "true"
    ports:
      - "8101:8101"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  # ── API Server (FastAPI) ──
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${DB_PASSWORD:-postgres}@postgres:5432/tlf_saas
      DATABASE_SYNC_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/tlf_saas
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      STACK_AUTH_JWKS_URL: http://stack-auth:8101/api/v1/.well-known/jwks.json
      STACK_AUTH_ISSUER: http://stack-auth:8101
      CORS_ORIGINS: http://localhost:3100
      DEBUG: "false"
    ports:
      - "8100:8100"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  # ── Celery Worker (CPU-bound report generation) ──
  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile.worker
    depends_on:
      api:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${DB_PASSWORD:-postgres}@postgres:5432/tlf_saas
      DATABASE_SYNC_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/tlf_saas
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      WORKER_TEMP_DIR: /tmp/tlf-worker
    volumes:
      - workertmp:/tmp/tlf-worker
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "2"
          memory: 4G

  # ── Frontend (Next.js + Stack Auth Starter) ──
  frontend:
    build:
      context: frontend/
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8100/api/v1
    depends_on:
      - api
      - stack-auth
    environment:
      NEXT_PUBLIC_STACK_PROJECT_ID: ${STACK_PROJECT_ID:-internal}
      NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY: ${STACK_PUBLISHABLE_KEY:-}
      NEXT_PUBLIC_STACK_URL: http://stack-auth:8101
      # Client-side fetches go through localhost (port published on host).
      # Server-side rendering would need http://api:8000, but our frontend
      # uses client-side data fetching (useEffect), so localhost is correct.
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    ports:
      - "3100:3100"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  pgdata:
  redisdata:
  miniodata:
  workertmp:
