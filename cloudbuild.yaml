# GCP Cloud Build config — build all images for TLF Report Generator
# Trigger: gcloud builds submit --config=cloudbuild.yaml

substitutions:
  _REGION: us-central1
  _ARTIFACT_REPO: tlf-repo
  _SHORT_SHA: latest
  _NEXT_PUBLIC_API_URL: '/api/v1'
  _API_REWRITE_URL: 'https://temp-url/api/v1'
  _GOOGLE_CLIENT_ID: ''
  _GOOGLE_CLIENT_SECRET: ''
  _GITHUB_CLIENT_ID: ''
  _GITHUB_CLIENT_SECRET: ''
  _MICROSOFT_CLIENT_ID: ''
  _MICROSOFT_CLIENT_SECRET: ''
  _CREEM_API_KEY: ''
  _CREEM_WEBHOOK_SECRET: ''
  _NEXT_PUBLIC_CREEM_PRODUCT_ID_PRO: ''
  _NEXT_PUBLIC_CREEM_PRODUCT_ID_PLUS: ''

steps:
  # 1. API service
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/tlf-api:${_SHORT_SHA}'
      - -t
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/tlf-api:latest'
      - -f
      - backend/Dockerfile.cloudrun
      - .
  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        docker push ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/tlf-api:${_SHORT_SHA}
        docker push ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/tlf-api:latest

  # 2. HTTP Worker
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/tlf-worker:${_SHORT_SHA}'
      - -t
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/tlf-worker:latest'
      - -f
      - backend/Dockerfile.worker-http
      - .
  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        docker push ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/tlf-worker:${_SHORT_SHA}
        docker push ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/tlf-worker:latest

  # 3. Frontend (Next.js standalone)
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - '--build-arg=NEXT_PUBLIC_API_URL=$_NEXT_PUBLIC_API_URL'
      - '--build-arg=API_REWRITE_URL=$_API_REWRITE_URL'
      - '--build-arg=NEXT_PUBLIC_GOOGLE_CLIENT_ID=$_GOOGLE_CLIENT_ID'
      - '--build-arg=NEXT_PUBLIC_GITHUB_CLIENT_ID=$_GITHUB_CLIENT_ID'
      - '--build-arg=NEXT_PUBLIC_MICROSOFT_CLIENT_ID=$_MICROSOFT_CLIENT_ID'
      - '--build-arg=NEXT_PUBLIC_CREEM_PRODUCT_ID_PRO=$_NEXT_PUBLIC_CREEM_PRODUCT_ID_PRO'
      - '--build-arg=NEXT_PUBLIC_CREEM_PRODUCT_ID_PLUS=$_NEXT_PUBLIC_CREEM_PRODUCT_ID_PLUS'
      - -t
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/tlf-frontend:${_SHORT_SHA}'
      - -t
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/tlf-frontend:latest'
      - -f
      - frontend/Dockerfile
      - frontend
  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        docker push ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/tlf-frontend:${_SHORT_SHA}
        docker push ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/tlf-frontend:latest

  # 4. Deploy Cloud Run services
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - tlf-api
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/tlf-api:${_SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--timeout=300'
      - '--set-env-vars=^;^DATABASE_URL=$_DATABASE_URL;DATABASE_SYNC_URL=$_DATABASE_SYNC_URL;REDIS_URL=$_REDIS_URL;CELERY_BROKER_URL=$_CELERY_BROKER_URL;CELERY_RESULT_BACKEND=$_CELERY_RESULT_BACKEND;WORKER_HTTP_URL=$_WORKER_HTTP_URL;SUPERTOKENS_CONNECTION_URI=$_SUPERTOKENS_CONNECTION_URI;SUPERTOKENS_API_KEY=$_SUPERTOKENS_API_KEY;CORS_ORIGINS=$_CORS_ORIGINS;DEBUG=False;STORAGE_BACKEND=gcs;GOOGLE_CLIENT_ID=$_GOOGLE_CLIENT_ID;GOOGLE_CLIENT_SECRET=$_GOOGLE_CLIENT_SECRET;GITHUB_CLIENT_ID=$_GITHUB_CLIENT_ID;GITHUB_CLIENT_SECRET=$_GITHUB_CLIENT_SECRET;MICROSOFT_CLIENT_ID=$_MICROSOFT_CLIENT_ID;MICROSOFT_CLIENT_SECRET=$_MICROSOFT_CLIENT_SECRET;CREEM_API_KEY=$_CREEM_API_KEY;CREEM_WEBHOOK_SECRET=$_CREEM_WEBHOOK_SECRET'

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - tlf-worker
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/tlf-worker:${_SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--no-allow-unauthenticated'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--timeout=1800'
      - '--max-instances=3'
      - '--concurrency=1'
      - '--set-env-vars=^;^DATABASE_SYNC_URL=$_DATABASE_SYNC_URL;REDIS_URL=$_REDIS_URL;STORAGE_BACKEND=gcs'

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - tlf-frontend
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/tlf-frontend:${_SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--timeout=300'
      - '--set-env-vars=^;^NODE_ENV=production;NEXT_TELEMETRY_DISABLED=1;API_REWRITE_URL=$_API_REWRITE_URL'

timeout: 1800s
